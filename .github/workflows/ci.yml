name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint
        run: npx eslint src/ --no-error-on-unmatched-pattern || true
      - name: Install rsbuild
        run: npm install --save-dev @rsbuild/core
      - name: Build
        run: npx rsbuild build
      - name: Run tests
        run: npm test
